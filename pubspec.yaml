name: stretchly
description: Guided stretching routines app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0
  drift: ^2.22.0
  drift_flutter: ^0.2.1
  shared_preferences: ^2.3.0
  flutter_riverpod: ^2.5.1
  crypto: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  drift_dev: ^2.22.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
